<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCB Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e1628;
    font-family: system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100vh;
  }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: #161e30; padding: 8px 16px;
    display: flex; gap: 12px; align-items: center;
    border-bottom: 1px solid #2a3450;
    font-size: 13px;
  }
  #toolbar button {
    background: #1878e0; color: #fff; border: none; border-radius: 4px;
    padding: 4px 12px; cursor: pointer; font-size: 12px;
  }
  #toolbar button:hover { background: #2090f0; }
  #toolbar .sep { width: 1px; height: 20px; background: #2a3450; }
  #info {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #161e30; padding: 6px 16px;
    border-top: 1px solid #2a3450;
    font-size: 12px; color: #90b8e0;
    display: flex; gap: 24px;
  }
  #netPanel {
    position: fixed; top: 40px; right: 0; width: 200px; bottom: 28px;
    background: #161e30; border-left: 1px solid #2a3450;
    padding: 8px; overflow-y: auto; font-size: 12px;
  }
  #netPanel h3 { font-size: 11px; color: #6080a0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .net-row {
    display: flex; align-items: center; gap: 6px; padding: 2px 4px;
    cursor: pointer; border-radius: 3px;
  }
  .net-row:hover { background: #1a2a44; }
  .net-row.active { background: #1a3050; }
  .net-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .net-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .net-count { color: #506880; font-size: 11px; }
  canvas { display: block; cursor: grab; }
  canvas.panning { cursor: grabbing; }
  #dropzone {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(24,120,224,0.15); border: 3px dashed #1878e0;
    display: none; align-items: center; justify-content: center;
    z-index: 100; font-size: 24px; color: #1878e0;
  }
  #dropzone.visible { display: flex; }
  #searchBox {
    background: #0e1628; border: 1px solid #2a3450; color: #fff;
    padding: 2px 6px; font-size: 11px; border-radius: 3px; width: 120px;
  }
</style>
</head>
<body>
<div id="toolbar">
  <span style="font-weight:bold">PCB Viewer</span>
  <div class="sep"></div>
  <button onclick="resetView()">Fit</button>
  <button onclick="toggleGrid()">Grid</button>
  <button onclick="toggleLabels()">Labels</button>
  <button onclick="loadFile()">Load JSON</button>
  <div class="sep"></div>
  <span id="boardName" style="color:#e08818">-</span>
  <span style="flex:1"></span>
  <span id="coords" style="color:#506880">-</span>
</div>
<canvas id="c"></canvas>
<div id="netPanel">
  <input id="searchBox" placeholder="Filter nets..." oninput="updateNetPanel()">
  <div id="netList"></div>
</div>
<div id="info">
  <span id="hoverInfo">Drop a board.json or click Load JSON</span>
  <span style="flex:1"></span>
  <span id="stats">-</span>
</div>
<div id="dropzone">Drop board.json here</div>
<input type="file" id="fileInput" accept=".json" style="display:none">
<script>
let BOARD = null;
let NET_COLORS = {};

const COL = {
  board: '#1060b8',
  boardEdge: '#0c4888',
  padDefault: '#c8a820',
  via: '#a04010',
  viaHole: '#0e1628',
  silk: '#e0e0d8',
  bg: '#0e1628',
  grid: '#141e30',
  gridMajor: '#1a2840',
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let showGrid = true;
let showLabels = true;
let highlightNet = -1;

let viewX = 0, viewY = 0, viewScale = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panStartVX = 0, panStartVY = 0;

function resize() {
  canvas.width = window.innerWidth - 200;
  canvas.height = window.innerHeight - 68;
  canvas.style.marginTop = '40px';
  if (BOARD) { resetView(); } else { draw(); }
}

function resetView() {
  if (!BOARD) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  // Use outline if available, else compute from traces
  const pts = BOARD.board.outline.length > 2 ? BOARD.board.outline : [];
  if (pts.length > 2) {
    for (const p of pts) { minX = Math.min(minX, p[0]); minY = Math.min(minY, p[1]); maxX = Math.max(maxX, p[0]); maxY = Math.max(maxY, p[1]); }
  } else {
    for (const t of BOARD.traces) for (const p of t.points) { minX = Math.min(minX, p[0]); minY = Math.min(minY, p[1]); maxX = Math.max(maxX, p[0]); maxY = Math.max(maxY, p[1]); }
    for (const fp of BOARD.footprints) { minX = Math.min(minX, fp.pos[0] - 5); minY = Math.min(minY, fp.pos[1] - 5); maxX = Math.max(maxX, fp.pos[0] + 5); maxY = Math.max(maxY, fp.pos[1] + 5); }
  }
  const bw = maxX - minX, bh = maxY - minY;
  const pad = Math.max(bw, bh) * 0.08;
  viewScale = Math.min(canvas.width / (bw + pad * 2), canvas.height / (bh + pad * 2));
  viewX = canvas.width / 2 - (minX + bw / 2) * viewScale;
  viewY = canvas.height / 2 - (minY + bh / 2) * viewScale;
  draw();
}

function tx(x) { return x * viewScale + viewX; }
function ty(y) { return y * viewScale + viewY; }
function tw(w) { return w * viewScale; }
function itx(sx) { return (sx - viewX) / viewScale; }
function ity(sy) { return (sy - viewY) / viewScale; }

function netColor(net) { return NET_COLORS[net] || '#505050'; }
function netName(net) { return (BOARD && BOARD.nets[net]) || (net === 0 ? '(NC)' : 'Net ' + net); }

// Generate distinct colors for all nets
function buildNetColors() {
  NET_COLORS = { 0: '#404040' };
  if (!BOARD) return;
  const named = { 'GND': '#e04818', '+3V3': '#e08818', '+5V': '#e8b010', 'VCC': '#e08818', 'VBUS': '#c85020', '+3.3V': '#e08818', '+12V': '#c85020', 'VBAT': '#c85020' };
  const netIds = Object.keys(BOARD.nets).map(Number).filter(n => n > 0);
  let hi = 0;
  for (const nid of netIds) {
    const name = BOARD.nets[nid];
    if (named[name]) { NET_COLORS[nid] = named[name]; }
    else {
      // Golden-angle hue spread for max distinction
      const h = (hi * 137.508) % 360;
      const s = 65 + (hi % 3) * 10;
      const l = 50 + (hi % 2) * 8;
      NET_COLORS[nid] = `hsl(${h},${s}%,${l}%)`;
      hi++;
    }
  }
}

function drawGrid() {
  if (!showGrid) return;
  // Adaptive grid step based on zoom
  let step = 1;
  if (viewScale < 2) step = 10;
  else if (viewScale < 5) step = 5;
  else if (viewScale < 15) step = 2;
  const majorStep = step * 5;

  const x0 = Math.floor(itx(0) / step) * step;
  const x1 = Math.ceil(itx(canvas.width) / step) * step;
  const y0 = Math.floor(ity(0) / step) * step;
  const y1 = Math.ceil(ity(canvas.height) / step) * step;

  ctx.lineWidth = 0.5;
  for (let x = x0; x <= x1; x += step) {
    ctx.strokeStyle = (x % majorStep === 0) ? COL.gridMajor : COL.grid;
    ctx.beginPath(); ctx.moveTo(tx(x), 0); ctx.lineTo(tx(x), canvas.height); ctx.stroke();
  }
  for (let y = y0; y <= y1; y += step) {
    ctx.strokeStyle = (y % majorStep === 0) ? COL.gridMajor : COL.grid;
    ctx.beginPath(); ctx.moveTo(0, ty(y)); ctx.lineTo(canvas.width, ty(y)); ctx.stroke();
  }
}

function isHigh(net) { return highlightNet === -1 || highlightNet === net; }

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!BOARD) return;

  drawGrid();

  // Board outline
  const outline = BOARD.board.outline;
  if (outline.length > 2) {
    ctx.fillStyle = COL.board;
    ctx.strokeStyle = COL.boardEdge;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < outline.length; i++) {
      i === 0 ? ctx.moveTo(tx(outline[i][0]), ty(outline[i][1])) : ctx.lineTo(tx(outline[i][0]), ty(outline[i][1]));
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // B.Cu traces (dashed, underneath)
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (const t of BOARD.traces) {
    if (t.layer !== 'B.Cu') continue;
    ctx.globalAlpha = isHigh(t.net) ? 0.7 : 0.08;
    ctx.strokeStyle = netColor(t.net);
    ctx.lineWidth = Math.max(tw(t.width), 0.8);
    ctx.setLineDash([tw(0.3), tw(0.15)]);
    ctx.beginPath();
    for (let j = 0; j < t.points.length; j++) {
      j === 0 ? ctx.moveTo(tx(t.points[j][0]), ty(t.points[j][1])) : ctx.lineTo(tx(t.points[j][0]), ty(t.points[j][1]));
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // F.Cu traces
  for (const t of BOARD.traces) {
    if (t.layer === 'B.Cu') continue;
    ctx.globalAlpha = isHigh(t.net) ? 1 : 0.1;
    ctx.strokeStyle = netColor(t.net);
    ctx.lineWidth = Math.max(tw(t.width), 0.8);
    ctx.beginPath();
    for (let j = 0; j < t.points.length; j++) {
      j === 0 ? ctx.moveTo(tx(t.points[j][0]), ty(t.points[j][1])) : ctx.lineTo(tx(t.points[j][0]), ty(t.points[j][1]));
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Vias
  for (const v of BOARD.vias) {
    const x = tx(v.pos[0]), y = ty(v.pos[1]);
    const or = Math.max(tw(v.size / 2), 1.5);
    const ir = Math.max(tw(v.drill / 2), 0.7);
    ctx.globalAlpha = isHigh(v.net) ? 1 : 0.12;
    ctx.fillStyle = netColor(v.net);
    ctx.beginPath(); ctx.arc(x, y, or, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COL.viaHole;
    ctx.beginPath(); ctx.arc(x, y, ir, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Helper: rotate a local point by footprint rotation
  // KiCad rotation is negated vs standard math convention
  function rotLocal(lx, ly, rot) {
    if (!rot) return [lx, ly];
    const rad = -rot * Math.PI / 180;
    const c = Math.cos(rad), s = Math.sin(rad);
    return [lx * c - ly * s, lx * s + ly * c];
  }

  // Footprints
  for (const fp of BOARD.footprints) {
    const fpx = fp.pos[0], fpy = fp.pos[1];
    const fpRot = fp.rot || 0;

    // Courtyard (rotated by footprint rotation)
    if (fp.courtyard && fp.courtyard.length > 1 && viewScale > 4) {
      ctx.strokeStyle = COL.silk;
      ctx.lineWidth = 0.6;
      ctx.setLineDash([3, 2]);
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      for (let i = 0; i < fp.courtyard.length; i++) {
        const [rx, ry] = rotLocal(fp.courtyard[i][0], fp.courtyard[i][1], fpRot);
        const sx = tx(fpx + rx), sy = ty(fpy + ry);
        i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      }
      ctx.closePath(); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
    }

    // Pads (rotated by footprint rotation, with pad shape rotation)
    for (let pi = 0; pi < fp.pads.length; pi++) {
      const p = fp.pads[pi];
      const [rlx, rly] = rotLocal(p.pos[0], p.pos[1], fpRot);
      const px = tx(fpx + rlx), py = ty(fpy + rly);

      // Pad shape rotation = footprint rot + pad's own rot (if any)
      const totalRot = fpRot; // pad rot only affects shape, handled by size swap below
      const pw = Math.max(tw(p.size[0]), 1.2), ph = Math.max(tw(p.size[1]), 1.2);
      const r = Math.min(pw, ph) * 0.15;

      ctx.globalAlpha = isHigh(p.net) ? 1 : 0.12;
      ctx.fillStyle = p.net > 0 ? netColor(p.net) : COL.padDefault;

      // Rotate pad rectangle if footprint is rotated
      if (fpRot % 180 !== 0 && fpRot % 90 === 0) {
        // 90/270: swap w/h
        ctx.beginPath();
        ctx.roundRect(px - ph / 2, py - pw / 2, ph, pw, r);
        ctx.fill();
      } else if (fpRot % 90 !== 0 && fpRot !== 0) {
        // Arbitrary rotation: use canvas transform
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(-fpRot * Math.PI / 180);
        ctx.beginPath();
        ctx.roundRect(-pw / 2, -ph / 2, pw, ph, r);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.roundRect(px - pw / 2, py - ph / 2, pw, ph, r);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Ref label: only at high zoom, skip placeholder refs like "REF**"
    if (showLabels && viewScale > 8 && fp.ref && !fp.ref.includes('*')) {
      const labelSize = Math.max(7, Math.min(tw(0.5), 11));
      ctx.fillStyle = '#b0b0a0';
      ctx.globalAlpha = 0.8;
      ctx.font = `bold ${labelSize}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(fp.ref, tx(fpx), ty(fpy) - Math.max(tw(0.6), 4));
      ctx.globalAlpha = 1;
    }
  }
}

// Hit testing
function hitTest(mx, my) {
  if (!BOARD) return null;
  const bx = itx(mx), by = ity(my);
  const hitR = 1.5 / viewScale; // 1.5px in board space

  for (const fp of BOARD.footprints) {
    const fpRot = fp.rot || 0;
    const fpRad = -fpRot * Math.PI / 180;
    for (let pi = 0; pi < fp.pads.length; pi++) {
      const p = fp.pads[pi];
      let lx = p.pos[0], ly = p.pos[1];
      if (fpRad) { const c = Math.cos(fpRad), s = Math.sin(fpRad); const rx = lx*c - ly*s, ry = lx*s + ly*c; lx = rx; ly = ry; }
      const px = fp.pos[0] + lx, py = fp.pos[1] + ly;
      const maxPad = Math.max(p.size[0], p.size[1]);
      const hw = maxPad / 2 + hitR, hh = maxPad / 2 + hitR;
      if (bx >= px - hw && bx <= px + hw && by >= py - hh && by <= py + hh) {
        return { type: 'pad', fp: fp.ref, val: fp.value, pin: pi + 1, net: p.net };
      }
    }
  }

  for (const t of BOARD.traces) {
    for (let j = 0; j < t.points.length - 1; j++) {
      const [x1, y1] = t.points[j], [x2, y2] = t.points[j + 1];
      const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx * dx + dy * dy);
      if (len < 0.001) continue;
      const proj = ((bx - x1) * dx + (by - y1) * dy) / (len * len);
      if (proj < -0.05 || proj > 1.05) continue;
      const cx = x1 + Math.max(0, Math.min(1, proj)) * dx, cy = y1 + Math.max(0, Math.min(1, proj)) * dy;
      if (Math.sqrt((bx - cx) ** 2 + (by - cy) ** 2) < Math.max(t.width, hitR * 2)) {
        return { type: 'trace', layer: t.layer, net: t.net, width: t.width };
      }
    }
  }

  for (const v of BOARD.vias) {
    if (Math.sqrt((bx - v.pos[0]) ** 2 + (by - v.pos[1]) ** 2) < v.size / 2 + hitR) {
      return { type: 'via', net: v.net };
    }
  }
  return null;
}

// Events
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const mx = e.offsetX, my = e.offsetY;
  const bx = itx(mx), by = ity(my);
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  viewScale *= factor;
  viewX = mx - bx * viewScale;
  viewY = my - by * viewScale;
  draw();
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    isPanning = true;
    panStartX = e.offsetX; panStartY = e.offsetY;
    panStartVX = viewX; panStartVY = viewY;
    canvas.classList.add('panning');
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isPanning) {
    viewX = panStartVX + (e.offsetX - panStartX);
    viewY = panStartVY + (e.offsetY - panStartY);
    draw();
  }
  const bx = itx(e.offsetX), by = ity(e.offsetY);
  document.getElementById('coords').textContent = `${bx.toFixed(2)}, ${by.toFixed(2)} mm`;

  const hit = hitTest(e.offsetX, e.offsetY);
  const el = document.getElementById('hoverInfo');
  if (hit) {
    const nn = netName(hit.net);
    if (hit.type === 'pad') el.textContent = `${hit.fp} (${hit.val}) Pin ${hit.pin} | Net: ${nn}`;
    else if (hit.type === 'trace') el.textContent = `Trace ${hit.layer} | Net: ${nn} | ${hit.width}mm`;
    else if (hit.type === 'via') el.textContent = `Via | Net: ${nn}`;
  } else {
    el.textContent = '-';
  }
});

canvas.addEventListener('mouseup', () => { isPanning = false; canvas.classList.remove('panning'); });

canvas.addEventListener('click', (e) => {
  if (Math.abs(e.offsetX - panStartX) > 3 || Math.abs(e.offsetY - panStartY) > 3) return;
  const hit = hitTest(e.offsetX, e.offsetY);
  if (hit && hit.net > 0) { highlightNet = (highlightNet === hit.net) ? -1 : hit.net; }
  else { highlightNet = -1; }
  updateNetPanel(); draw();
});

// Drag and drop
document.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropzone').classList.add('visible'); });
document.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) document.getElementById('dropzone').classList.remove('visible'); });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('visible');
  const file = e.dataTransfer.files[0];
  if (file) readBoardFile(file);
});

function loadFile() {
  const input = document.getElementById('fileInput');
  input.onchange = () => { if (input.files[0]) readBoardFile(input.files[0]); };
  input.click();
}

function readBoardFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      loadBoard(data, file.name);
    } catch (e) { alert('Invalid JSON: ' + e.message); }
  };
  reader.readAsText(file);
}

function loadBoard(data, name) {
  BOARD = data;
  buildNetColors();
  document.getElementById('boardName').textContent = name || 'board';
  const nNets = Object.keys(BOARD.nets).filter(k => BOARD.nets[k]).length;
  document.getElementById('stats').textContent =
    `${BOARD.footprints.length} components | ${BOARD.traces.length} traces | ${BOARD.vias.length} vias | ${nNets} nets`;
  highlightNet = -1;
  updateNetPanel();
  resetView();
}

function toggleGrid() { showGrid = !showGrid; draw(); }
function toggleLabels() { showLabels = !showLabels; draw(); }

function updateNetPanel() {
  const list = document.getElementById('netList');
  if (!BOARD) { list.innerHTML = ''; return; }
  const filter = document.getElementById('searchBox').value.toLowerCase();

  let html = '<h3 style="margin-top:8px">Nets</h3>';
  const netIds = Object.keys(BOARD.nets).map(Number).filter(n => n > 0).sort((a, b) => {
    return (BOARD.nets[a] || '').localeCompare(BOARD.nets[b] || '');
  });

  let shown = 0;
  for (const nid of netIds) {
    const name = BOARD.nets[nid] || 'Net ' + nid;
    if (filter && !name.toLowerCase().includes(filter)) continue;
    const active = highlightNet === nid ? ' active' : '';
    const padC = BOARD.footprints.reduce((n, fp) => n + fp.pads.filter(p => p.net === nid).length, 0);
    const trC = BOARD.traces.filter(t => t.net === nid).length;
    html += `<div class="net-row${active}" onclick="clickNet(${nid})">
      <div class="net-swatch" style="background:${netColor(nid)}"></div>
      <span class="net-name">${name}</span>
      <span class="net-count">${padC}p</span>
    </div>`;
    if (++shown >= 200) { html += `<div style="color:#506880;padding:4px">...${netIds.length - shown} more</div>`; break; }
  }

  html += '<h3 style="margin-top:12px">Components</h3>';
  let fpShown = 0;
  for (const fp of BOARD.footprints) {
    if (filter && !fp.ref.toLowerCase().includes(filter) && !(fp.value || '').toLowerCase().includes(filter)) continue;
    html += `<div class="net-row" style="cursor:default">
      <span class="net-name"><b>${fp.ref}</b> ${fp.value || ''}</span>
      <span class="net-count">${fp.pads.length}p</span>
    </div>`;
    if (++fpShown >= 100) { html += `<div style="color:#506880;padding:4px">...${BOARD.footprints.length - fpShown} more</div>`; break; }
  }
  list.innerHTML = html;
}

function clickNet(nid) {
  highlightNet = (highlightNet === nid) ? -1 : nid;
  updateNetPanel(); draw();
}

// Auto-load example board from same directory
async function tryLoadExample() {
  try {
    const res = await fetch('example-board.json');
    if (res.ok) {
      const data = await res.json();
      loadBoard(data, 'example-board.json');
      return;
    }
  } catch (e) {}
  // Try test board
  try {
    const res = await fetch('test-board.json');
    if (res.ok) {
      const data = await res.json();
      loadBoard(data, 'test-board.json');
    }
  } catch (e) {}
}

window.addEventListener('resize', resize);
resize();
tryLoadExample();
</script>
</body>
</html>
